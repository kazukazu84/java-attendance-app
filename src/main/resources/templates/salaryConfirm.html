<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>給与一覧</title>
    <link rel="stylesheet" th:href="@{/css/salaryConfirm.css}">
</head>

<body>

<!-- ★ 背景アニメーション -->
<div class="bg-animation"></div>

<div class="container">

    <!-- タイトル -->
    <h1 class="page-title">給与一覧</h1>

    <!-- 年度選択 -->
    <div class="card center">
        <form th:action="@{${basePath} + '/salary/confirm'}" method="post" class="form-area">

            <label class="form-label">年度選択</label>

            <select name="targetYear" class="form-select">
                <option th:each="year : ${yearList}"
                        th:value="${year}"
                        th:text="${year}"
                        th:selected="${year} == ${salaryConfirmForm.targetYear}">
                </option>
            </select>

            <input type="hidden" name="userId" th:value="${salaryConfirmForm.userId}">

            <button type="submit" class="submit-btn">表示</button>
        </form>
    </div>

    <!-- エラー -->
    <div th:if="${errorMessage}" class="alert-box">
        <p th:text="${errorMessage}"></p>
    </div>

    <!-- 年間サマリー -->
    <div th:if="${salaryList}" class="summary-box">
        <p>対象年度：<span th:text="${salaryConfirmForm.targetYear}"></span> 年</p>
        <p>年間勤務時間：<span th:text="${totalWorkingHours}"></span> 時間</p>
        <p>年間差引支給額：<span th:text="${totalNetSalary}"></span> 円</p>
    </div>

    <!-- 一覧テーブル -->
    <div th:if="${salaryList}" class="card">
        <table class="salary-table">
            <thead>
                <tr>
                    <th>対象月</th>
                    <th>給与額</th>
                    <th>詳細</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${salaryList}">
                    <td>
                        <span th:text="${item.targetMonth}"></span> 月
                    </td>

                    <td>
                        <span th:text="${item.netSalary}"></span> 円
                    </td>

                    <td>
                        <a th:href="@{${basePath} + '/salary/detail'(
                            userId=${item.userId},
                            targetYear=${item.targetYear},
                            targetMonth=${item.targetMonth}
                        )}" class="detail-btn">詳細</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- メイン画面へ -->
    <div class="actions">
        <a th:href="@{${basePath} + '/main'}" class="back-link">メイン画面へ</a>
    </div>

</div>

</body>
</html>
