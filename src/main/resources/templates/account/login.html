<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { color: #000 !important; background-color: #fff; font-family: sans-serif; }
        .form-control { border: 1px solid #000 !important; border-radius: 0px !important; color: #000 !important; }
        .form-control:focus { box-shadow: none !important; border-color: #000 !important; }
        
        .btn-mono { 
            border: 1px solid #000 !important; 
            color: #fff !important; 
            background: #000 !important; 
            border-radius: 0px !important; 
            font-weight: bold;
            transition: all 0.1s ease;
        }
        .btn-mono:hover { background: #fff !important; color: #000 !important; }

        .alert-mono { border: 1px solid #000 !important; border-radius: 0px !important; color: #000 !important; background-color: #fff !important; font-weight: bold; }
    </style>
</head>
<body class="container mt-5" style="max-width: 400px;">

	<div class="text-center mb-4 border-bottom pb-3" style="border-color: #000 !important;">
	    <h3 class="fw-bold text-black mb-2" style="font-weight: 800; letter-spacing: 0.05em;">🔑 勤怠管理システム</h3>
	    <div class="text-black fw-bold" style="font-size: 1.4rem; font-weight: 900; letter-spacing: 0.15em;">ロ グ イ ン</div>
	</div>
    
	<div th:if="${param.error}" class="alert mb-3 text-start" 
	     style="background-color: #fafafa; border: 1px solid #000; border-radius: 0px; padding: 10px 14px;">
	    <div class="d-flex align-items-start fw-bold text-black" 
	         style="font-size: 0.82rem; word-break: keep-all; line-height: 1.6;">
	        <span class="me-2" style="margin-top: 1px;">⚠️</span>
	        <span th:text="${errorMsg}"></span>
	    </div>
	</div>

    <div th:if="${param.logout}" class="alert alert-mono small mb-3">
        ✓ ログアウトしました。
    </div>
    
    <form th:action="@{/authenticate}" method="post">
		<div class="mb-3">
		    <label class="form-label fw-bold">ユーザーID</label>
		    <input type="text" name="username" 
		           class="form-control" 
		           style="border-radius: 0px; border-color: #000;"
		           required />
		</div>
        
        <div class="mb-3">
            <label class="form-label fw-bold">パスワード</label>
            <input type="password" name="password" 
                   class="form-control" 
                   required />
        </div>
        
        <div class="pt-2">
            <button type="submit" class="btn btn-mono w-100 py-2">ログイン</button>
        </div>
    </form>

</body>
</html>
