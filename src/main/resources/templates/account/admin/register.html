<!DOCTYPE html>
<!-- テンプレートファイルパス: src/main/resources/templates/account/admin/register.html -->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <!-- IDの有無でタイトルを動的に変更 -->
    <title th:text="${userRegisterForm.userId == null || userRegisterForm.userId == ''} ? '新規アカウント作成' : 'アカウント編集'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        /* 徹底的なモノクロとミニマリズム */
        body { color: #000 !important; background-color: #fff; font-family: sans-serif; }
        .form-control, .form-select { border: 1px solid #000 !important; border-radius: 0px !important; color: #000 !important; }
        .form-control:focus, .form-select:focus { box-shadow: none !important; border-color: #000 !important; }
        
        /* フラットボタン（黒背景・白文字） */
        .btn-mono { 
            border: 1px solid #000 !important; 
            color: #fff !important; 
            background: #000 !important; 
            border-radius: 0px !important; 
            font-weight: bold;
            transition: all 0.1s ease;
        }
        .btn-mono:hover { background: #fff !important; color: #000 !important; }
        
        /* 戻るボタン（白背景・黒線） */
        .btn-mono-outline { 
            border: 1px solid #000 !important; 
            color: #000 !important; 
            background: #fff !important; 
            border-radius: 0px !important; 
        }
        .btn-mono-outline:hover { background: #f0f0f0 !important; }
        
        /* チェックボックスのフラット化 */
        .form-check-input { border: 1px solid #000 !important; border-radius: 0px !important; }
        .form-check-input:checked { background-color: #000 !important; border-color: #000 !important; }
    </style>
</head>
<body class="container mt-4" style="max-width: 500px;"> 
    <!-- IDの有無で見出しを動的に変更 -->
    <h3 class="fw-bold text-black mb-4 border-bottom pb-2" 
        style="border-color: #000 !important;"
        th:text="${userRegisterForm.userId == null || userRegisterForm.userId == ''} ? '📋 新規アカウント作成' : '📋 アカウント情報の編集'">
    </h3>
    
    <!-- 
      th:object でコントローラーから渡された DTO (userRegisterForm) と紐付け。
      IDの有無によって送信先のURLを登録(/admin/register)と更新(/admin/update)で切り替える。
    -->
    <form th:action="${userRegisterForm.userId == null || userRegisterForm.userId == ''} ? @{/admin/register} : @{/admin/update}" 
          th:object="${userRegisterForm}" 
          method="post" 
          class="needs-validation">
        
        <div class="mb-3">
            <label class="form-label fw-bold">ユーザーID</label>
            <!-- 編集時はユーザーIDを変更不可 (readonly) にする -->
            <input type="text" th:field="*{userId}" class="form-control form-control-sm" 
                   th:readonly="${userRegisterForm.userId != null && userRegisterForm.userId != ''}" required />
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-bold">パスワード</label>
            <!-- 編集時は空欄のまま送信可能にするため、新規登録時のみ required にする -->
            <input type="password" th:field="*{password}" class="form-control form-control-sm" 
                   th:required="${userRegisterForm.userId == null || userRegisterForm.userId == ''}" />
            <small th:if="${userRegisterForm.userId != null && userRegisterForm.userId != ''}" class="text-muted">
                ※変更する場合のみ入力してください。
            </small>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">名前</label>
            <input type="text" th:field="*{userName}" class="form-control form-control-sm" required />
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-bold">役職</label>
            <select th:field="*{position}" class="form-select form-select-sm" required>
                <!-- DTOの値に基づいて自動的に selected が付与されます -->
                <option value="USER">ユーザ</option>
                <option value="ADMIN">管理者</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">時給（円）</label>
            <input type="number" th:field="*{wage}" class="form-control form-control-sm" min="0" required />
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">生年月日</label>
            <input type="date" th:field="*{birthDate}" class="form-control form-control-sm" required />
        </div>

        <input type="hidden" name="attendanceStatus" value="0" />

        <div class="mb-3 form-check">
            <!-- チェックボックスも th:field で状態を自動マッピング -->
            <input type="checkbox" th:field="*{employmentInsurance}" class="form-check-input" id="insuranceCheck">
            <label class="form-check-label fw-bold" for="insuranceCheck">雇用保険の対象とする</label>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">在籍ステータス</label>
            <select th:field="*{isActive}" class="form-select form-select-sm" required>
                <!-- DTOの値に基づいて自動的に selected が付与されます -->
                <option value="1">有効（ログイン可）</option>
                
                <option value="0">無効（ログイン不可）</option>
            </select>
        </div>

        <div class="pt-2">
            <!-- 状況に応じてボタンのテキストを「アカウント登録」または「更新」に変更 -->
            <button type="submit" class="btn btn-mono btn-sm me-2 fw-bold"
                    th:text="${userRegisterForm.userId == null || userRegisterForm.userId == ''} ? 'アカウント登録' : '更新'">
            </button>
            <a th:href="@{/admin/UserManagement}" class="btn btn-mono-outline btn-sm">戻る</a>
        </div>
    </form>

</body>
</html>
