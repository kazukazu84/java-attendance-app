<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <!-- 💡 isNew で判定 -->
    <title th:text="${isNew} ? '新規アカウント作成' : 'アカウント編集'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { color: #000 !important; background-color: #fff; font-family: sans-serif; }
        .form-control, .form-select { border: 1px solid #000 !important; border-radius: 0px !important; color: #000 !important; }
        .form-control:focus, .form-select:focus { box-shadow: none !important; border-color: #000 !important; }
        
        .btn-mono { 
            border: 1px solid #000 !important; color: #fff !important; background: #000 !important; 
            border-radius: 0px !important; font-weight: bold; transition: all 0.1s ease;
        }
        .btn-mono:hover { background: #fff !important; color: #000 !important; }
        
        .btn-mono-outline { 
            border: 1px solid #000 !important; color: #000 !important; background: #fff !important; border-radius: 0px !important; 
        }
        .btn-mono-outline:hover { background: #f0f0f0 !important; }
        
        .form-check-input { border: 1px solid #000 !important; border-radius: 0px !important; }
        .form-check-input:checked { background-color: #000 !important; border-color: #000 !important; }
        .error-message { color: #dc3545; font-size: 0.8rem; font-weight: bold; margin-top: 0.25rem; }
    </style>
</head>
<body class="container mt-4" style="max-width: 500px;"> 
    
    <!-- 💡 isNew で判定 -->
    <h3 class="fw-bold text-black mb-4 border-bottom pb-2" 
        style="border-color: #000 !important;"
        th:text="${isNew} ? '📋 新規アカウント作成' : '📋 アカウント情報の編集'">
    </h3>
    
    <!-- 💡 isNew で判定 -->
    <form th:action="${isNew} ? @{/admin/register} : @{/admin/update}" 
          th:object="${userRegisterForm}" 
          method="post" 
          class="needs-validation" novalidate>
        
        <!-- ユーザーID -->
        <div class="mb-3">
            <label class="form-label fw-bold">ユーザーID</label>
            <!-- 💡 isNew ではない（編集）場合のみ readonly にする -->
            <input type="text" th:field="*{userId}" class="form-control form-control-sm" 
                   th:readonly="${!isNew}" />
            <div th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}" class="error-message"></div>
        </div>
        
        <!-- パスワード -->
        <div class="mb-3">
            <label class="form-label fw-bold">パスワード</label>
            
            <!-- 💡 【新規登録画面】 isNew で判定 -->
            <th:block th:if="${isNew}">
                <div class="input-group input-group-sm">
                    <input type="password" th:field="*{password}" class="form-control" id="passwordInputRegister" />
                    <button class="btn btn-mono-outline" type="button" onclick="togglePasswordVisibility('passwordInputRegister', this)">👁️</button>
                </div>
            </th:block>
            
            <!-- 💡 【編集画面】 isNew で判定 -->
            <th:block th:if="${!isNew}">
                <div class="input-group input-group-sm" id="passwordEditGroup">
                    <input type="text" id="passwordInput" name="password" th:value="*{password}" class="form-control" readonly />
                    <button class="btn btn-mono-outline" type="button" id="toggleVisibilityBtn" style="display: none;" onclick="togglePasswordVisibility('passwordInput', this)">👁️</button>
                </div>
                <small class="text-muted d-block mt-1" id="passwordHelpText">
                    ※変更する場合のみ、下部の「パスワードリセット」ボタンを押して入力してください。
                </small>
            </th:block>
            <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error-message"></div>
        </div>

        <!-- 名前 -->
        <div class="mb-3">
            <label class="form-label fw-bold">名前</label>
            <input type="text" th:field="*{userName}" class="form-control form-control-sm" />
            <div th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}" class="error-message"></div>
        </div>
        
        <!-- 役職 -->
        <div class="mb-3">
            <label class="form-label fw-bold">役職</label>
            <select th:field="*{position}" class="form-select form-select-sm">
                <option value="">選択してください</option>
                <option value="USER">ユーザ</option>
                <option value="ADMIN">管理者</option>
            </select>
            <div th:if="${#fields.hasErrors('position')}" th:errors="*{position}" class="error-message"></div>
        </div>
		
		<!-- 時給 -->
		<div class="mb-3">
		    <label class="form-label fw-bold">時給（選択）</label>
		    <select th:field="*{wageId}" class="form-select form-select-sm">
		        <option value="" selected hidden>時給を選択してください</option>
		        <option th:each="w : ${wages}" th:value="${w.wageId}" th:text="${w.wageValue} + '円'"></option>
		    </select>
            <div th:if="${#fields.hasErrors('wageId')}" th:errors="*{wageId}" class="error-message"></div>
		</div>

        <!-- 生年月日 -->
        <div class="mb-3">
            <label class="form-label fw-bold">生年月日</label>
            <input type="date" th:field="*{birthDate}" class="form-control form-control-sm" />
            <div th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}" class="error-message"></div>
        </div>

        <input type="hidden" name="attendanceStatus" value="0" />

        <div class="mb-3 form-check">
            <input type="checkbox" th:field="*{employmentInsurance}" class="form-check-input" id="insuranceCheck">
            <label class="form-check-label fw-bold" for="insuranceCheck">雇用保険の対象とする</label>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">在籍ステータス</label>
            <select th:field="*{isActive}" class="form-select form-select-sm" required>
                <option value="1">有効（ログイン可）</option>
                <option value="0">無効（ログイン不可）</option>
            </select>
        </div>

        <!-- 下部ボタン部 -->
        <div class="pt-2 d-flex justify-content-start gap-3">
            <!-- 💡 isNew で判定 -->
            <button type="submit" class="btn btn-mono btn-sm fw-bold"
                    th:text="${isNew} ? 'アカウント登録' : '更新'">
            </button>
            
            <a th:href="@{/admin/UserManagement}" class="btn btn-mono-outline btn-sm">戻る</a>
			
			<!-- 💡 isNew ではない（編集）場合のみ表示 -->
            <button th:if="${!isNew}" 
                    type="button" class="btn btn-mono-outline btn-sm fw-bold" 
                    id="resetPasswordBtn" onclick="handlePasswordReset()">
                パスワードリセット
            </button>
		</div>
    </form>

    <script th:inline="javascript">
        function handlePasswordReset() {
            if (confirm("パスワードをリセットして再入力しますか？\n（「はい」を押すと新しいパスワードを入力できます）")) {
                const passwordInput = document.getElementById("passwordInput");
                const toggleBtn = document.getElementById("toggleVisibilityBtn");
                
                passwordInput.type = "password";
                passwordInput.value = "";
                passwordInput.readOnly = false;
                
                toggleBtn.style.display = "block";
                passwordInput.focus();
                
                document.getElementById("resetPasswordBtn").style.display = "none";
            }
        }

        function togglePasswordVisibility(inputId, buttonEl) {
            const passwordInput = document.getElementById(inputId);
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                buttonEl.textContent = "🙈";
            } else {
                passwordInput.type = "password";
                buttonEl.textContent = "👁️";
            }
        }
    </script>
</body>
</html>
