<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isNew} ? '新規アカウント作成 - 勤怠管理システム' : 'アカウント編集 - 勤怠管理システム'"></title>
    <!-- Bootstrap (レイアウト補助用) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <!-- 共通テーマCSS -->
    <link rel="stylesheet" th:href="@{/css/style_Account.css}">
</head>
<body>

    <div class="container" style="max-width: 550px;"> 
        <div class="card my-4">
            
            <!-- タイトルエリア -->
            <h1 class="page-title text-start fs-4 mb-4 pb-2 border-bottom" 
                th:text="${isNew} ? '📋 新規アカウント作成' : '📋 アカウント情報の編集'">
            </h1>
            
            <form th:action="${isNew} ? @{/admin/register} : @{/admin/update}" 
                  th:object="${userRegisterForm}" 
                  method="post" 
                  class="needs-validation" novalidate>
                
                <!-- ユーザーID -->
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary small">ユーザーID</label>
                    <input type="text" th:field="*{userId}" class="form-control" 
                           th:readonly="${!isNew}" />
                    <div th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}" class="error-message"></div>
                </div>
                
                <!-- パスワード -->
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary small">パスワード</label>
                    
                    <!-- 【新規登録画面】 -->
                    <th:block th:if="${isNew}">
                        <div class="input-group">
                            <input type="password" th:field="*{password}" class="form-control" id="passwordInputRegister" />
                            <button class="btn btn-secondary-custom" type="button" onclick="togglePasswordVisibility('passwordInputRegister', this)">👁️</button>
                        </div>
                    </th:block>
                    
                    <!-- 【編集画面】 -->
                    <th:block th:if="${!isNew}">
                        <div class="input-group" id="passwordEditGroup">
                            <input type="text" id="passwordInput" name="password" th:value="*{password}" class="form-control" readonly />
                            <button class="btn btn-secondary-custom" type="button" id="toggleVisibilityBtn" style="display: none;" onclick="togglePasswordVisibility('passwordInput', this)">👁️</button>
                        </div>
                        <small class="text-muted d-block mt-1" id="passwordHelpText">
                            ※変更する場合のみ、下部の「パスワードリセット」ボタンを押して入力してください。
                        </small>
                    </th:block>
                    <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error-message"></div>
                </div>

                <!-- 名前 -->
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary small">名前</label>
                    <input type="text" th:field="*{userName}" class="form-control" />
                    <div th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}" class="error-message"></div>
                </div>
                
                <!-- 役職 -->
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary small">役職</label>
                    <select th:field="*{position}" class="form-select">
                        <option value="">選択してください</option>
                        <option value="USER">ユーザ</option>
                        <option value="ADMIN">管理者</option>
                    </select>
                    <div th:if="${#fields.hasErrors('position')}" th:errors="*{position}" class="error-message"></div>
                </div>
                
                <!-- 時給 -->
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary small">時給（選択）</label>
                    <select th:field="*{wageId}" class="form-select">
                        <option value="" selected hidden>時給を選択してください</option>
                        <option th:each="w : ${wages}" th:value="${w.wageId}" th:text="${w.wageValue} + '円'"></option>
                    </select>
                    <div th:if="${#fields.hasErrors('wageId')}" th:errors="*{wageId}" class="error-message"></div>
                </div>

                <!-- 生年月日 -->
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary small">生年月日</label>
                    <input type="date" th:field="*{birthDate}" class="form-control" />
                    <div th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}" class="error-message"></div>
                </div>

                <input type="hidden" name="attendanceStatus" value="0" />

                <!-- 雇用保険 -->
                <div class="mb-3 form-check">
                    <input type="checkbox" th:field="*{employmentInsurance}" class="form-check-input" id="insuranceCheck">
                    <label class="form-check-label fw-bold text-secondary small" for="insuranceCheck">雇用保険の対象とする</label>
                </div>

                <!-- 在籍ステータス -->
                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary small">在籍ステータス</label>
                    <select th:field="*{isActive}" class="form-select" required>
                        <option value="1">有効（ログイン可）</option>
                        <option value="0">無効（ログイン不可）</option>
                    </select>
                </div>

                <!-- ボタンエリア -->
                <div class="pt-2 d-flex justify-content-start align-items-center gap-2">
                    <button type="submit" class="btn btn-primary-custom px-4 py-2"
                            th:text="${isNew} ? 'アカウント登録' : '更新'">
                    </button>
                    
                    <a th:href="@{/admin/UserManagement}" class="btn btn-secondary-custom px-3 py-2">戻る</a>
                    
                    <button th:if="${!isNew}" 
                            type="button" class="btn btn-danger-custom px-3 py-2 ms-auto" 
                            id="resetPasswordBtn" onclick="handlePasswordReset()">
                        🔑 パスワードリセット
                    </button>
                </div>
            </form>

        </div>
    </div>

    <script th:inline="javascript">
        function handlePasswordReset() {
            if (confirm("パスワードをリセットして再入力しますか？\n（「はい」を押すと新しいパスワードを入力できます）")) {
                const passwordInput = document.getElementById("passwordInput");
                const toggleBtn = document.getElementById("toggleVisibilityBtn");
                
                passwordInput.type = "password";
                passwordInput.value = "";
                passwordInput.readOnly = false;
                
                toggleBtn.style.display = "block";
                passwordInput.focus();
                
                document.getElementById("resetPasswordBtn").style.display = "none";
            }
        }

        function togglePasswordVisibility(inputId, buttonEl) {
            const passwordInput = document.getElementById(inputId);
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                buttonEl.textContent = "🙈";
            } else {
                passwordInput.type = "password";
                buttonEl.textContent = "👁️";
            }
        }
    </script>
</body>
</html>
