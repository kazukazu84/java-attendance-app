<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ユーザー管理 - 勤怠管理システム</title>
    <!-- Bootstrap (レイアウト補助用) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <!-- 共通テーマCSS -->
    <link rel="stylesheet" th:href="@{/css/style_Account.css}">
</head>
<body>

    <div class="container-wide my-4">
        <div class="card">
            
            <!-- ヘッダーエリア -->
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <h1 class="page-title fs-3 m-0">👥 ユーザー管理一覧</h1>
                
                <div class="d-flex align-items-center gap-3">
                    <!-- 検索フォーム（元のアクション・パラメータをそのまま保持） -->
                    <form th:action="@{/admin/users/search}" method="get" class="d-flex">
                        <div class="input-group">
                            <input type="text" name="keyword" th:value="${param.keyword}" class="form-control" placeholder="検索キーワードを入力" required>
                            <button type="submit" name="type" value="id" class="btn btn-outline-custom">ID検索</button>
                            <button type="submit" name="type" value="name" class="btn btn-outline-custom">名前検索</button>
                            <a th:href="@{/admin/UserManagement}" class="btn btn-secondary-custom d-flex align-items-center justify-content-center" style="text-decoration: none;">✕ 解除</a>
                        </div>
                    </form>

                    <!-- ボタン群 -->
                    <div class="d-flex gap-2">
                        <a th:href="@{/admin/register}" class="btn btn-primary-custom px-3 py-2 text-nowrap">
                            ➕ 新規登録
                        </a>
                        <!-- 💡 正しい戻り先: /admin/main -->
                        <a th:href="@{/admin/main}" class="btn btn-secondary-custom px-3 py-2 text-nowrap">
                            🏠 戻る
                        </a>
                    </div>
                </div>
            </div>

            <!-- 一括操作フォーム ＆ テーブルエリア -->
            <form th:action="@{/admin/users/batch-deactivate}" method="post" id="batchDeactivateForm">
                <div class="table-responsive">
                    <table class="data-table text-center align-middle">
                        <thead>
                            <tr>
                                <th style="width: 50px;">
                                    <input type="checkbox" id="selectAll" class="form-check-input" onclick="toggleSelectAll(this)">
                                </th>
                                <th>ユーザーID</th>
                                <th>名前</th>
                                <th>役職</th>
                                <th>時給</th>
                                <th>生年月日</th>
                                <th>勤怠状況</th>
                                <th>雇用保険</th>
                                <th>在籍ステータス</th>
                                <th style="width: 120px;">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td>
                                    <input type="checkbox" name="userIds" th:value="${user.userId}" 
                                           th:if="${#authentication.name != user.userId && user.isActive != 0}" class="form-check-input user-checkbox">
                                    <input type="checkbox" disabled th:if="${#authentication.name == user.userId || user.isActive == 0}" class="form-check-input">
                                </td>
                                <td class="fw-bold" th:text="${user.userId}"></td>
                                <td th:text="${user.userName}"></td>
                                <td th:text="${user.position}"></td>
                                <!-- 💡 Wageエンティティ経由での安全なアクセス -->
                                <td th:text="${user.wage != null ? user.wage.wageValue + '円' : '-'}"></td>
                                <td th:text="${#dates.format(user.birthDate, 'yyyy/MM/dd')}"></td>
                                <td th:text="${user.attendanceStatusStr}" th:classappend="${user.attendanceStatus == 1 ? 'fw-bold text-primary' : ''}"></td>
                                <td th:text="${user.employmentInsuranceStr}"></td>
                                <td>
                                    <span th:if="${user.isActive == 1}" class="badge bg-success">有効</span>
                                    <span th:if="${user.isActive == 0}" class="badge bg-danger">無効</span>
                                </td>
                                <td>
                                    <div th:if="${#authentication.name != user.userId}">
                                        <a th:href="@{/admin/edit/{id}(id=${user.userId})}" class="btn btn-outline-custom btn-sm px-3">
                                            ✏️ 編集
                                        </a>
                                    </div>
                                    <div th:if="${#authentication.name == user.userId}" class="d-flex align-items-center justify-content-center">
                                        <span class="badge bg-secondary">ログイン中</span>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="10" class="text-muted py-4">該当するユーザーは見つかりませんでした。</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 一括無効化ボタン -->
                <div class="mt-3 text-start">
                    <button type="submit" class="btn btn-danger px-3 py-2" onclick="return confirmDeactivate()">
                        🗑️ 選択したユーザーを一括無効化
                    </button>
                </div>
            </form>

        </div>
    </div>

    <!-- 元のJavaScript処理を保持 -->
    <script>
        // ヘッダーのチェックボックスで全選択/解除
        function toggleSelectAll(master) {
            const checkboxes = document.querySelectorAll('.user-checkbox');
            checkboxes.forEach(cb => cb.checked = master.checked);
        }

        // 無効化前のチェックと確認
        function confirmDeactivate() {
            const checkedCount = document.querySelectorAll('.user-checkbox:checked').length;
            if (checkedCount === 0) {
                alert('無効化するユーザーを選択してください。');
                return false;
            }
            return confirm(`選択された ${checkedCount} 件のユーザーを本当に無効化しますか？`);
        }
    </script>
</body>
</html>
