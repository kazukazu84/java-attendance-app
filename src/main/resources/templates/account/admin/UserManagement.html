<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ユーザー管理</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { color: #000 !important; background-color: #fff; font-family: sans-serif; }
        .table { border-color: #000 !important; }
        .table th { font-weight: bold; color: #000; background-color: #f0f0f0 !important; border-bottom: 2px solid #000 !important; }
        .table td { color: #000 !important; }

        .btn-mono { 
            border: 1px solid #000 !important; 
            color: #000 !important; 
            background: #fff !important; 
            border-radius: 0px !important; 
            font-weight: bold;
            transition: all 0.1s ease;
        }
        .btn-mono:hover { background: #000 !important; color: #fff !important; }

        .btn-mono-del { 
            border: 1px solid #767676 !important; 
            color: #767676 !important; 
            background: #fff !important; 
            border-radius: 0px !important; 
            transition: all 0.1s ease;
        }
        .btn-mono-del:hover { border-color: #000 !important; background: #000 !important; color: #fff !important; }

        .text-muted-mono { color: #666 !important; }
    </style>
</head>
<body class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2" style="border-color: #000 !important;">
        <h3 class="m-0 fw-bold">ユーザー管理</h3>
		
        <div class="d-flex align-items-center">
            <form th:action="@{/admin/users/search}" method="get" class="d-flex me-4">
                <div class="input-group input-group-sm">
                    <input type="text" name="keyword" class="form-control" placeholder="検索キーワードを入力" style="border-radius: 0px; border-color: #000;" required>
                    <button type="submit" name="type" value="id" class="btn btn-mono btn-sm">ID検索</button>
                    <button type="submit" name="type" value="name" class="btn btn-mono btn-sm">名前検索</button>
                    <a th:href="@{/admin/UserManagement}" class="btn btn-mono-del btn-sm d-flex align-items-center justify-content-center" style="text-decoration: none;">✕ 解除</a>				   
                </div>
            </form>
		
            <div>
                <a th:href="@{/admin/register}" class="btn btn-mono btn-sm me-2">新規登録</a>
                <a th:href="@{/admin/m-admin}" class="btn btn-mono btn-sm">戻る</a>
            </div>
        </div>
    </div>

    <div class="mb-3">
        <p class="fs-5 fw-bold text-black mb-2">📋 登録ユーザー一覧</p>
		
        <form th:action="@{/admin/users/batch-deactivate}" method="post" id="batchDeactivateForm">
            <table class="table table-sm table-bordered align-middle text-center">
                <thead>
                    <tr>
                        <th style="width: 50px;"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th>
                        <th>ユーザーID</th>
                        <th>名前</th>
                        <th>役職</th>
                        <th>時給</th>
                        <th>生年月日</th>
                        <th>勤怠状況</th>
                        <th>雇用保険</th>
                        <th>在籍ステータス</th>
                        <th style="width: 150px;">操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td>
                            <input type="checkbox" name="userIds" th:value="${user.userId}" 
                                   th:if="${#authentication.name != user.userId && user.isActive != 0}" class="user-checkbox">
                            <input type="checkbox" disabled th:if="${#authentication.name == user.userId || user.isActive == 0}">
                        </td>
                        
                        <td th:text="${user.userId}" class="fw-bold"></td>
                        <td th:text="${user.userName}"></td>
                        <td th:text="${user.position}"></td>
                        <td th:text="${user.wage + '円'}"></td>
                        <td th:text="${#dates.format(user.birthDate, 'yyyy/MM/dd')}"></td>                    
                        <td th:text="${user.attendanceStatusStr}" th:classappend="${user.attendanceStatus == 1 ? 'fw-bold' : ''}"></td>
                        <td th:text="${user.employmentInsuranceStr}"></td>
                        <td th:text="${user.isActiveStr}"></td>
                        
                        <td>
                            <div th:if="${#authentication.name != user.userId}">
                                <a th:href="@{/users/edit/{id}(id=${user.userId})}" class="btn btn-mono btn-sm py-0 px-2" style="font-size: 0.85rem;">編集</a>
                            </div>
                            <div th:if="${#authentication.name == user.userId}" class="d-flex align-items-center justify-content-center" style="height: 24px;">
                                <span class="text-muted-mono small fw-bold">ログイン中</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <div class="mt-2 text-start">
                <button type="submit" class="btn btn-mono-del btn-sm" onclick="return confirmDeactivate()">
                    選択したユーザーを一括無効化
                </button>
            </div>
        </form>
    </div>
			
    <script>
        // ヘッダーのチェックボックスで全選択/解除（無効化されていない有効なチェックボックスだけを選択）
        function toggleSelectAll(master) {
            const checkboxes = document.querySelectorAll('.user-checkbox');
            checkboxes.forEach(cb => cb.checked = master.checked);
        }

        // 無効化前のチェックと確認
        function confirmDeactivate() {
            const checkedCount = document.querySelectorAll('.user-checkbox:checked').length;
            if (checkedCount === 0) {
                alert('無効化するユーザーを選択してください。');
                return false;
            }
            return confirm(`選択された ${checkedCount} 件のユーザーを本当に無効化しますか？`);
        }
    </script>
</body>
</html>
