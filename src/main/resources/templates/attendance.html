<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>簡易勤怠</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/attendance.css}">
    <!-- CSRF対策 -->
    <meta th:name="_csrf" th:content="${_csrf.token}"/>
    <meta th:name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="attendance-container text-center">
        <h1 class="page-title mb-4">簡易勤怠</h1>

        <!-- ステータス表示部 -->
        <div class="status-box mb-3" id="statusMessage" th:text="${status?.statusMessage}">
            状態を読み込み中...
        </div>

        <!-- 時刻表示部 -->
        <div class="time-display mb-4" id="realTimeDisplay">
            yyyy/MM/dd HH:mm:ss
        </div>

        <!-- ボタンエリア（中央部） -->
        <div class="row g-3 mb-4">
            <div class="col-6">
                <button type="button" id="btnClockIn" class="btn btn-clock-in w-100" 
                        th:disabled="${status == null || !status.canClockIn}">出勤</button>
            </div>
            <div class="col-6">
                <button type="button" id="btnClockOut" class="btn btn-clock-out w-100" 
                        th:disabled="${status == null || !status.canClockOut}">退勤</button>
            </div>
        </div>

        <hr class="my-4" style="border-color: var(--border-color);">

        <!-- ボタンエリア（最下部） -->
        <div class="row align-items-center">
            <div class="col-4 text-start">
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-logout">ログアウト</button>
                </form>
            </div>
            
            <div class="col-4 text-center">
                <a th:href="@{/user/main}" class="btn btn-sub">メイン画面へ</a>
            </div>
            
            <div class="col-4"></div>
        </div>
    </div>
</div>

<script>
    // 1. リアルタイム時計
    function updateClock() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const date = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');

        document.getElementById('realTimeDisplay').innerText = `${year}/${month}/${date} ${hours}:${minutes}:${seconds}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 2. 打刻処理 (SPA)
    function updateDOM(data) {
        document.getElementById('statusMessage').innerText = data.statusMessage;
        document.getElementById('btnClockIn').disabled = !data.canClockIn;
        document.getElementById('btnClockOut').disabled = !data.canClockOut;
    }

    // 出勤ボタン
    document.getElementById('btnClockIn').addEventListener('click', () => {
        const token = document.querySelector('meta[name="_csrf"]').getAttribute('content');
        const header = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
        fetch('/api/attendance/clock-in', { 
            method: 'POST',
            headers: { [header]: token }
        })
        .then(response => {
            if (!response.ok) {
                return response.text().then(errorMessage => Promise.reject(errorMessage));
            }
            return response.json();
        })
        .then(data => updateDOM(data))
        .catch(errorText => alert("【打刻エラー】\n" + errorText));
    });

    // 退勤ボタン
    document.getElementById('btnClockOut').addEventListener('click', () => {
        const token = document.querySelector('meta[name="_csrf"]').getAttribute('content');
        const header = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
        fetch('/api/attendance/clock-out', { 
            method: 'POST',
            headers: { [header]: token }
        })
        .then(response => {
            if (!response.ok) {
                return response.text().then(errorMessage => Promise.reject(errorMessage));
            }
            return response.json();
        })
        .then(data => updateDOM(data))
        .catch(errorText => alert("【打刻エラー】\n" + errorText));
    });
</script>

</body>
</html>
