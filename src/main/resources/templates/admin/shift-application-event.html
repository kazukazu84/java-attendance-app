<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>シフト受付期間設定</title>
    <link rel="stylesheet" th:href="@{/css/shift-application-event.css}">
</head>

<body>

<h1>シフト受付期間設定</h1>

<!-- グローバルエラーメッセージ表示エリア -->
<div th:if="${errorMessage != null}" class="error-msg" style="color: red; font-weight: bold; margin-bottom: 15px;">
    <p th:text="${errorMessage}"></p>
</div>

<!-- 要件②：Gap（未作成期間）警告表示エリア -->
<div th:if="${gapList != null and !gapList.empty}" class="warning-msg" style="background-color: #fff3cd; color: #856404; padding: 10px; border: 1px solid #ffeeba; margin-bottom: 15px;">
    <strong>【警告】</strong>
    <ul>
        <li th:each="gap : ${gapList}" th:text="${gap.message}"></li>
    </ul>
</div>

<!-- ========================= -->
<!-- 新規イベント作成 -->
<!-- ========================= -->

<form id="createForm" th:action="@{/admin/shift-application-event/create}"
      th:object="${createShiftApplicationEventForm}"
      method="post">

    <input type="hidden" name="confirmConfirmed" id="createConfirmConfirmed" value="false">

    <label>対象期間</label>
    <select th:field="*{targetWeeks}"
            th:disabled="${editingEventId != null}">
        <option value="1">1週間</option>
        <option value="2">2週間</option>
        <option value="3">3週間</option>
        <option value="4">4週間</option>
    </select>

    <label>受付開始</label>
    <select th:field="*{applicationStartDays}"
            th:disabled="${editingEventId != null}">
        <option th:each="i : ${#numbers.sequence(30,1)}"
                th:value="${i}"
                th:text="${i + '日前'}">
        </option>
    </select>

    <label>受付締切</label>
    <select th:field="*{applicationEndDays}"
            th:disabled="${editingEventId != null}">
        <option th:each="i : ${#numbers.sequence(14,1)}"
                th:value="${i}"
                th:text="${i + '日前'}">
        </option>
    </select>

    <button type="submit"
            class="btn-primary"
            th:disabled="${editingEventId != null}">
        新規作成
    </button>

</form>

<br>

<!-- ========================= -->
<!-- イベント一覧 -->
<!-- ========================= -->

<table border="1">

    <thead>
    <tr>
        <th>状態</th><!-- ★「対象期間開始」の左側に追加 -->
        <th>対象期間開始</th>
        <th>対象期間終了</th>
        <th>受付開始</th>
        <th>受付終了</th>
        <th>編集</th>
        <th>削除</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="event : ${eventList}">

        <!-- 通常表示 -->
        <th:block th:if="${editingEventId != event.eventId}">

            <td th:text="${event.statusLabel}"></td><!-- ★状態の表示文字列を出力 -->
            <td th:text="${event.targetStartDate}"></td>
            <td th:text="${event.targetEndDate}"></td>
            <td th:text="${event.applicationStartDate}"></td>
            <td th:text="${event.applicationEndDate}"></td>

            <td>
                <form th:action="@{/admin/shift-application-event/edit}" method="post">
                    <input type="hidden" name="eventId" th:value="${event.eventId}">
                    <button type="submit" class="btn-primary">編集</button>
                </form>
            </td>

            <td>
                <form th:action="@{/admin/shift-application-event/delete}" method="post">
                    <input type="hidden" name="eventId" th:value="${event.eventId}">
                    <button type="submit" class="btn-secondary" th:disabled="${editingEventId != null}">削除</button>
                </form>
            </td>

        </th:block>

        <!-- 編集モード -->
        <th:block th:if="${editingEventId == event.eventId}">

            <td colspan="7"><!-- ★列数増加に伴い colspan を 6 から 7 に変更 -->

                <!-- 1つのフォーム内にまとめ、二重ネストを回避 -->
                <form id="updateForm"
                      th:object="${updateShiftApplicationEventForm}"
                      method="post">

                    <input type="hidden" name="confirmConfirmed" id="updateConfirmConfirmed" value="false">
                    <input type="hidden" th:field="*{eventId}">

                    <table>
                        <tr>
                            <td>
                                <input type="date" id="targetStartDate" th:field="*{targetStartDate}">
                            </td>
                            <td>
                                <input type="date" id="targetEndDate" th:field="*{targetEndDate}">
                            </td>
                            <td>
                                <input type="date" th:field="*{applicationStartDate}">
                            </td>
                            <td>
                                <input type="date" th:field="*{applicationEndDate}">
                            </td>
                            <td>
                                <!-- formaction で送信先を /update に指定 -->
                                <button type="submit"
                                        th:formaction="@{/admin/shift-application-event/update}"
                                        class="btn-primary">
                                    完了
                                </button>
                            </td>
                            <td>
                                <!-- formaction で送信先を /cancel に指定（二重フォーム回避） -->
                                <button type="submit"
                                        th:formaction="@{/admin/shift-application-event/cancel}"
                                        class="btn-cancel">
                                    キャンセル
                                </button>
                            </td>
                        </tr>
                    </table>

                </form>

            </td>

        </th:block>

    </tr>

    </tbody>

</table>

<br>

<button type="button"
        class="btn-secondary"
        th:onclick="|location.href='@{/admin/shift-management}'|"
        th:disabled="${editingEventId != null}">
    戻る
</button>

<!-- JS制御（サーバー側での判定結果に基づきダイアログを表示） -->
<script th:inline="javascript">
/*<![CDATA[*/
window.addEventListener('DOMContentLoaded', function() {
    var pendingFormType = /*[[${pendingFormType}]]*/ null;
    var pendingGapMessage = /*[[${pendingGapMessage}]]*/ null;

    if (pendingFormType && pendingGapMessage) {
        if (confirm(pendingGapMessage)) {
            if (pendingFormType === 'create') {
                document.getElementById('createConfirmConfirmed').value = 'true';
                document.getElementById('createForm').submit();
            } else if (pendingFormType === 'update') {
                document.getElementById('updateConfirmConfirmed').value = 'true';
                document.getElementById('updateForm').submit();
            }
        }
    }
});
/*]]>*/
</script>

</body>

</html>
