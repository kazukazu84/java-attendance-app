<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>シフト申請（仮）</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container text-center" style="margin-top: 100px; max-width: 500px;">
        <div class="card p-4 shadow-sm">
            <h3 class="mb-4">シフト申請画面（仮）</h3>
            <p class="text-muted">※シフト申請機能は担当外の班が開発します</p>
			<a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/main}" class="btn btn-secondary">
			    メイン画面へ戻る
			</a>

			<!-- 一般ユーザーの場合： /user/main へ戻る -->
			<a sec:authorize="!hasRole('ADMIN')" th:href="@{/user/main}" class="btn btn-secondary">
			    メイン画面へ戻る
			</a>
        </div>
    </div>
</body>
</html>
